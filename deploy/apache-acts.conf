  # ACTS static site (GitHub-deployed from gspray/ACTS)
  RedirectMatch 301 ^/acts$ /acts/
  Alias /acts /home/bitnami/apps/acts/site
  <Directory /home/bitnami/apps/acts/site>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html
  </Directory>
